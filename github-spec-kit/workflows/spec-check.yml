# =============================================================================
# SDD Spec Check — PR Spec 검증 워크플로우
# SDD Spec Check — Pull Request Spec Validation Workflow
# =============================================================================
#
# [한글]
# 기능: PR이 열릴 때 해당 브랜치와 연결된 Spec 문서를 자동으로 검증한다.
# 트리거 시점: PR이 opened, synchronize(새 커밋 push), reopened 될 때 자동 실행.
# 스킵 조건: docs/, hotfix/, fix/, chore/, feature/spec-* 브랜치는 검증 건너뜀.
#
# 실행 흐름:
#   1. 브랜치명에서 Spec 이름 추출 (feat/user-auth → user-auth)
#   2. .specify/specs/{name}.md 파일 존재 확인 (정확 매칭 → 퍼지 매칭)
#   3. .specify/plans/{name}-plan.md 계획 문서 존재 확인
#   4. Spec 파일 내 필수 섹션 검증 (요구사항, API, 테스트)
#   5. PR에 검증 결과 코멘트 자동 작성 (기존 코멘트 있으면 업데이트)
#   6. Spec 미발견 시 경고 코멘트 + 워크플로우 실패 처리
#
# Trine 파이프라인 연계:
#   - Phase 4 (PR 생성) 이후 GitHub에서 자동 실행
#   - Check 5 (PR Health)의 일부로서, Spec 존재 + 구조 검증
#   - 리뷰어에게 Spec/Plan 링크 + 검증 체크리스트 제공
#
# 배포 위치: 프로젝트의 .github/workflows/spec-check.yml 에 복사하여 사용
#
# [English]
# Purpose: Automatically validates Spec documents linked to a PR when it's opened.
# Trigger: Fires on PR opened, synchronize (new commits pushed), or reopened events.
# Skip conditions: docs/, hotfix/, fix/, chore/, feature/spec-* branches are skipped.
#
# Execution flow:
#   1. Extract Spec name from branch name (feat/user-auth → user-auth)
#   2. Check if .specify/specs/{name}.md exists (exact match → fuzzy match)
#   3. Check if .specify/plans/{name}-plan.md plan document exists
#   4. Validate required sections in Spec file (Requirements, API, Testing)
#   5. Post validation result as PR comment (update existing comment if found)
#   6. If Spec not found, post warning comment + fail the workflow
#
# Trine pipeline integration:
#   - Runs automatically on GitHub after Phase 4 (PR creation)
#   - Part of Check 5 (PR Health) — validates Spec existence + structure
#   - Provides Spec/Plan links + review checklist for reviewers
#
# Deployment: Copy to .github/workflows/spec-check.yml in your project
# =============================================================================

name: SDD Spec Check

# [한글] PR이 열리거나, 새 커밋이 push되거나, 다시 열릴 때 트리거
# [English] Triggered when a PR is opened, new commits are pushed, or PR is reopened
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  spec-validation:
    runs-on: ubuntu-latest
    # [한글] 비기능 브랜치(docs, hotfix, fix, chore)와 Spec 관리 브랜치는 검증 스킵
    # [English] Skip validation for non-feature branches and spec-maintenance branches
    if: >-
      ${{
        !startsWith(github.head_ref, 'docs/') &&
        !startsWith(github.head_ref, 'hotfix/') &&
        !startsWith(github.head_ref, 'fix/') &&
        !startsWith(github.head_ref, 'chore/') &&
        !startsWith(github.head_ref, 'feature/spec-')
      }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # [한글] Step 1: 브랜치명에서 Spec 이름 추출
      #   feat/user-auth → user-auth, fix/login-bug → login-bug
      #   슬래시(/) 이전의 prefix를 제거하여 Spec 파일명으로 매핑
      # [English] Step 1: Extract Spec name from branch name
      #   feat/user-auth → user-auth, fix/login-bug → login-bug
      #   Strips the prefix before slash(/) to map to a Spec filename
      - name: Extract spec name from branch
        id: extract-spec
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          SPEC_NAME=$(echo "$BRANCH_NAME" | sed 's/^[^/]*\///')
          echo "spec_name=$SPEC_NAME" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      # [한글] Step 2: Spec 파일 존재 확인
      #   1차: 정확한 파일명 매칭 (.specify/specs/{name}.md)
      #   2차: 퍼지 매칭 (파일명에 Spec 이름이 포함된 파일 검색)
      #   미발견 시: exists=false 출력 → 후속 Step에서 경고 코멘트 작성
      # [English] Step 2: Check if Spec file exists
      #   1st: Exact filename match (.specify/specs/{name}.md)
      #   2nd: Fuzzy match (search for files containing the Spec name)
      #   If not found: outputs exists=false → subsequent step posts warning comment
      - name: Check if spec file exists
        id: check-spec
        run: |
          SPEC_NAME="${{ steps.extract-spec.outputs.spec_name }}"

          # 1. Exact match / 정확 매칭
          SPEC_FILE=".specify/specs/${SPEC_NAME}.md"
          if [ -f "$SPEC_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "spec_file=$SPEC_FILE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. Fuzzy match / 퍼지 매칭 (파일명에 Spec 이름 포함)
          SPEC_FILES=$(find .specify/specs -type f -name "*${SPEC_NAME}*.md" 2>/dev/null || true)
          if [ -n "$SPEC_FILES" ]; then
            FIRST_FILE=$(echo "$SPEC_FILES" | head -n 1)
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "spec_file=$FIRST_FILE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Available specs:"
          ls -1 .specify/specs/ 2>/dev/null || echo "No specs found"

      # [한글] Step 3: Plan 문서 존재 확인
      #   Spec이 존재할 때만 실행. Plan 파일도 정확 매칭 → 퍼지 매칭 순서로 검색.
      #   Plan은 필수가 아니지만, 존재 여부를 PR 코멘트에 표시.
      # [English] Step 3: Check if Plan document exists
      #   Runs only when Spec exists. Searches Plan file with exact → fuzzy match.
      #   Plan is not required, but its existence is reported in the PR comment.
      - name: Check plan file exists
        id: check-plan
        if: steps.check-spec.outputs.exists == 'true'
        run: |
          SPEC_NAME="${{ steps.extract-spec.outputs.spec_name }}"

          # Exact match / 정확 매칭
          PLAN_FILE=".specify/plans/${SPEC_NAME}-plan.md"
          if [ -f "$PLAN_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "plan_file=$PLAN_FILE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fuzzy match / 퍼지 매칭
          PLAN_FILES=$(find .specify/plans -type f -name "*${SPEC_NAME}*.md" 2>/dev/null || true)
          if [ -n "$PLAN_FILES" ]; then
            FIRST_FILE=$(echo "$PLAN_FILES" | head -n 1)
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "plan_file=$FIRST_FILE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "exists=false" >> $GITHUB_OUTPUT

      # [한글] Step 4: Spec 파일 내 필수 섹션 검증
      #   - 요구사항(Requirements) 섹션: 필수 — 없으면 최종 Step에서 경고
      #   - API 섹션: 선택적 — 인프라/설정 Spec에는 없을 수 있음
      #   - 테스트(Testing) 섹션: 필수 — TDD 원칙에 따라 반드시 포함
      #   한글/영문 + 번호 prefix(## 1. 요구사항) 모두 인식
      # [English] Step 4: Validate required sections in Spec file
      #   - Requirements section: required — warning issued in final step if missing
      #   - API section: optional — may not exist for infra/config specs
      #   - Testing section: required — must be included per TDD principles
      #   Recognizes both Korean/English headings + numbered prefixes (## 1. Requirements)
      - name: Validate spec requirements
        id: validate-spec
        if: steps.check-spec.outputs.exists == 'true'
        run: |
          SPEC_FILE="${{ steps.check-spec.outputs.spec_file }}"

          # Requirements section (numbered + Korean/English patterns)
          # 요구사항 섹션 (번호 + 한글/영문 패턴)
          if grep -qP "## (\d+\.\s*)?(기능\s*)?요구사항|## (\d+\.\s*)?Requirements" "$SPEC_FILE"; then
            echo "has_requirements=true" >> $GITHUB_OUTPUT
          else
            echo "has_requirements=false" >> $GITHUB_OUTPUT
          fi

          # API section (conditional — optional for infra/config specs)
          # API 섹션 (조건부 — 인프라/설정 Spec에는 선택적)
          if grep -qP "## (\d+\.\s*)?API|## (\d+\.\s*)?Endpoints" "$SPEC_FILE"; then
            echo "has_api=true" >> $GITHUB_OUTPUT
          else
            echo "has_api=false" >> $GITHUB_OUTPUT
          fi

          # Testing section (required) / 테스트 섹션 (필수)
          if grep -qP "## (\d+\.\s*)?(테스트|Testing)" "$SPEC_FILE"; then
            echo "has_testing=true" >> $GITHUB_OUTPUT
          else
            echo "has_testing=false" >> $GITHUB_OUTPUT
          fi

      # [한글] Step 5: Spec 검증 결과를 PR 코멘트로 작성
      #   - 관련 문서(Spec, Plan) 링크
      #   - 섹션 검증 결과 체크리스트
      #   - 리뷰어용 수동 체크리스트 (구현 완료 여부, 테스트 커버리지 등)
      #   기존 봇 코멘트가 있으면 업데이트 (marker 기반 중복 방지)
      #   리뷰어가 이미 체크한 항목은 보존됨
      # [English] Step 5: Post Spec validation result as PR comment
      #   - Links to related documents (Spec, Plan)
      #   - Section validation result checklist
      #   - Manual review checklist for reviewers (implementation, test coverage, etc.)
      #   Updates existing bot comment if found (marker-based deduplication)
      #   Preserves items already checked by reviewers
      - name: Comment PR with spec info
        if: steps.check-spec.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const specFile = '${{ steps.check-spec.outputs.spec_file }}';
            const planFile = '${{ steps.check-plan.outputs.plan_file }}';
            const hasRequirements = '${{ steps.validate-spec.outputs.has_requirements }}' === 'true';
            const hasApi = '${{ steps.validate-spec.outputs.has_api }}' === 'true';
            const hasTesting = '${{ steps.validate-spec.outputs.has_testing }}' === 'true';
            const hasPlan = '${{ steps.check-plan.outputs.exists }}' === 'true';

            const marker = '## SDD Spec Check';

            let body = marker + '\n\n';
            body += '### Related Documents\n';
            body += `- **Spec**: [\`${specFile}\`](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/blob/${process.env.GITHUB_HEAD_REF}/${specFile})\n`;

            if (hasPlan) {
              body += `- **Plan**: [\`${planFile}\`](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/blob/${process.env.GITHUB_HEAD_REF}/${planFile})\n`;
            } else {
              body += '- **Plan**: Not found\n';
            }

            body += '\n### Spec Validation\n';
            body += hasRequirements ? '- [x] Requirements section found\n' : '- [ ] Requirements section missing\n';
            body += hasApi ? '- [x] API section found\n' : '- [ ] No API section (optional for infra/config specs)\n';
            body += hasTesting ? '- [x] Testing section found\n' : '- [ ] Testing section missing\n';
            body += hasPlan ? '- [x] Plan document exists\n' : '- [ ] Plan document missing\n';

            body += '\n### Review Checklist\n';
            body += '- [ ] All spec requirements implemented\n';
            body += '- [ ] Tests cover spec scenarios\n';
            body += '- [ ] Plan document updated\n';
            body += '- [ ] Documentation updated\n';

            // [한글] 기존 봇 코멘트 찾아서 업데이트 (marker 기반 중복 방지)
            // [English] Find existing bot comment and update (marker-based dedup)
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );

            if (existing) {
              // [한글] 리뷰어가 이미 체크한 항목 보존
              // [English] Preserve items already checked by reviewers
              const checkedItems = existing.body.match(/- \[x\] .+/g) || [];
              for (const item of checkedItems) {
                const label = item.replace('- [x] ', '');
                body = body.replace(`- [ ] ${label}`, `- [x] ${label}`);
              }

              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

      # [한글] Step 6: Spec 미발견 시 경고 코멘트 + 필요 액션 안내
      #   브랜치명과 기대되는 Spec 경로를 알려주고, 생성 또는 브랜치명 수정을 안내
      # [English] Step 6: Post warning comment when Spec not found + action guidance
      #   Shows branch name and expected Spec path, guides to create file or fix branch name
      - name: Comment if spec not found
        if: steps.check-spec.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = '${{ github.head_ref }}';
            const specName = '${{ steps.extract-spec.outputs.spec_name }}';

            const marker = '## Spec File Not Found';

            let body = marker + '\n\n';
            body += `Branch: \`${branchName}\`\n`;
            body += `Expected spec: \`.specify/specs/${specName}.md\`\n\n`;
            body += '### Action Required\n';
            body += `1. Create the spec file: \`.specify/specs/${specName}.md\`\n`;
            body += '2. Or update your branch name to match an existing spec\n\n';
            body += '### Available Specs\n';
            body += 'Check `.specify/specs/` directory for existing specs.';

            // Marker-based dedup / marker 기반 중복 방지
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && (c.body.startsWith(marker) || c.body.startsWith('## SDD Spec Check'))
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

      # [한글] Step 7: 최종 상태 판정
      #   Spec 미발견 → exit 1 (워크플로우 실패 → PR에 빨간 체크 표시)
      #   Requirements 섹션 누락 → 경고만 (실패는 아님)
      # [English] Step 7: Final status check
      #   Spec not found → exit 1 (workflow fails → red check on PR)
      #   Requirements section missing → warning only (not a failure)
      - name: Check status
        run: |
          if [ "${{ steps.check-spec.outputs.exists }}" == "false" ]; then
            echo "Spec file not found - please create it or fix branch name"
            exit 1
          fi

          if [ "${{ steps.validate-spec.outputs.has_requirements }}" == "false" ]; then
            echo "Warning: Spec file missing requirements section"
          fi

          echo "Spec check passed"
