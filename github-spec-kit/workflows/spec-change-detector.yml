name: Spec Change Detector

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.specify/specs/**'

permissions:
  contents: read
  issues: write

jobs:
  detect-spec-changes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed specs
        id: changed-specs
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '.specify/specs/*.md' '.specify/specs/**/*.md')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No spec files changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changed spec files:"
          echo "$CHANGED_FILES"

          CHANGED_LIST=$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//')
          echo "changed_files=$CHANGED_LIST" >> $GITHUB_OUTPUT

      - name: Analyze impact
        id: analyze
        if: steps.changed-specs.outputs.has_changes == 'true'
        run: |
          IFS=',' read -ra FILES <<< "${{ steps.changed-specs.outputs.changed_files }}"

          IMPACT_REPORT=""

          for SPEC_FILE in "${FILES[@]}"; do
            SPEC_NAME=$(basename "$SPEC_FILE" .md)

            IMPACT_REPORT+="### \`$SPEC_FILE\`\n\n"

            # Spec diff
            DIFF=$(git diff HEAD~1 HEAD "$SPEC_FILE" | grep "^[+-]" | grep -v "^[+-]\{3\}" || true)
            if [ -n "$DIFF" ]; then
              IMPACT_REPORT+="**Changes:**\n\`\`\`diff\n$DIFF\n\`\`\`\n\n"
            fi

            # Language-agnostic source search
            IMPACT_REPORT+="**Potentially affected files:**\n"

            RELATED_FILES=$(grep -rl "$SPEC_NAME" . \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
              --include="*.cs" --include="*.py" \
              --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".specify" \
              --exclude-dir=".github" --exclude-dir="dist" --exclude-dir="build" \
              2>/dev/null || echo "")

            if [ -n "$RELATED_FILES" ]; then
              echo "$RELATED_FILES" | while read -r f; do
                IMPACT_REPORT+="- \`$f\`\n"
              done
            else
              IMPACT_REPORT+="- No direct references found in source code\n"
            fi

            IMPACT_REPORT+="\n---\n\n"
          done

          IMPACT_REPORT=$(echo -e "$IMPACT_REPORT")
          echo "impact_report<<EOF" >> $GITHUB_OUTPUT
          echo "$IMPACT_REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tracking issue
        if: steps.changed-specs.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const changedFiles = '${{ steps.changed-specs.outputs.changed_files }}'.split(',');
            const title = `[Spec Change] ${changedFiles.map(f => f.split('/').pop()).join(', ')}`;

            const fileList = changedFiles.map(f => `- \`${f}\``).join('\n');
            const commitUrl = context.payload.head_commit?.url || `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            const body = `## Spec Change Detected

            The following Spec files were updated:
            ${fileList}

            ### TODO
            - [ ] Review spec changes
            - [ ] Update affected code
            - [ ] Update tests
            - [ ] Update documentation

            ### Related Commit
            ${commitUrl}

            *Auto-generated by GitHub Actions*`;

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['spec-change', 'needs-review']
              });
            } catch (error) {
              console.log('Failed with labels, creating without labels:', error.message);
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body
              });
            }
