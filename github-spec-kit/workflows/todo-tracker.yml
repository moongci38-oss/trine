# =============================================================================
# Todo Tracker — todo.md 자동 갱신 (범용)
# Todo Tracker — Auto-update todo.md on branch/PR events (Universal)
# =============================================================================
#
# [한글]
# 기능: 브랜치 생성 시 ⬜ Todo → 🔄 Doing, PR merge 시 🔄 Doing → ✅ Done
# 트리거: branch 생성 (create) + PR merge (pull_request closed)
# 매칭: 브랜치명에서 키워드 추출 → todo.md Spec 칼럼과 fuzzy match
# 모든 브랜치에서 동작 (main, develop, gh-pages 제외)
#
# 검색 방식: `find \( -type f -o -type l \)` — 실제 파일과 심볼릭 링크 모두 탐지
# 이를 통해 심볼릭 링크로 todo.md를 관리하는 프로젝트에서도 정상 동작
#
# [English]
# Purpose: Auto-update todo.md status on branch creation and PR merge
# Trigger: branch creation (create) + PR merge (pull_request closed)
# Matching: Extract keywords from branch name → fuzzy match against todo.md Spec column
# Works on all branches except main, develop, gh-pages
#
# Search: Uses `find \( -type f -o -type l \)` to detect both regular files and symlinks
# This ensures it works even when todo.md is managed as a symbolic link
#
# 배포 위치: 프로젝트의 .github/workflows/todo-tracker.yml 에 복사하여 사용
# Deployment: Copy to .github/workflows/todo-tracker.yml in your project
#
# 의존 스크립트: scripts/update-todo.py (github-spec-kit/scripts/ 에서 trine-sync로 배포)
# Required script: scripts/update-todo.py (deployed via trine-sync from github-spec-kit/scripts/)
# =============================================================================

name: Todo Tracker

on:
  create:  # branch created → Doing
  pull_request:
    types: [closed]  # PR merged → Done
    branches: [develop, main]

permissions:
  contents: write

jobs:
  mark-doing:
    runs-on: ubuntu-latest
    # 모든 브랜치 트리거 (main, develop, gh-pages 제외). 매칭은 Python 스크립트가 판단.
    if: >-
      github.event_name == 'create' &&
      github.ref_type == 'branch' &&
      github.ref_name != 'main' &&
      github.ref_name != 'develop' &&
      github.ref_name != 'gh-pages'

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and update todo.md
        id: update
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # -type f (regular file) + -type l (symlink) 모두 탐지
          TODO_FILE=$(find docs/planning -name "todo.md" \( -type f -o -type l \) 2>/dev/null | head -1)
          if [ -z "$TODO_FILE" ]; then
            echo "todo.md not found, skipping"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          python3 scripts/update-todo.py doing "$BRANCH" "$TODO_FILE"

          if git diff --quiet "$TODO_FILE"; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/planning/
          git commit -m "chore: auto-update todo.md — mark Doing [skip ci]"
          git push

  mark-done:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and update todo.md
        id: update
        env:
          BRANCH: ${{ github.head_ref }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # -type f (regular file) + -type l (symlink) 모두 탐지
          TODO_FILE=$(find docs/planning -name "todo.md" \( -type f -o -type l \) 2>/dev/null | head -1)
          if [ -z "$TODO_FILE" ]; then
            echo "todo.md not found, skipping"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          python3 scripts/update-todo.py done "$BRANCH" "$PR_NUM" "$PR_URL" "$TODO_FILE"

          if git diff --quiet "$TODO_FILE"; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/planning/
          git commit -m "chore: auto-update todo.md — mark Done [skip ci]"
          git push
